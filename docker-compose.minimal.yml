# Supply Chain AI OS — Minimal Stack
# No Spark/Dagster/Kafka. Perfect for demos and CEO presentations.
# Includes: Postgres, Redis, FastAPI (auto-migrates + seeds), Next.js, Grafana
#
# Usage:
#   cp .env.example .env        # fill in ANTHROPIC_API_KEY
#   docker compose -f docker-compose.minimal.yml up --build
#
# Dashboard:  http://localhost:3000
# API docs:   http://localhost:8000/docs
# API health: http://localhost:8000/health
# Grafana:    http://localhost:3002  (admin / admin)

services:
  # ── Infrastructure ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: sc-postgres
    environment:
      POSTGRES_USER: supplychain
      POSTGRES_PASSWORD: supplychain_secret
      POSTGRES_DB: supply_chain_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_minimal_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supplychain -d supply_chain_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: sc-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_minimal_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── API (auto-migrates + seeds on startup) ────────────────────────────────
  fastapi:
    build:
      context: .
      dockerfile: docker/FastAPI.Dockerfile
    container_name: sc-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://supplychain:supplychain_secret@postgres:5432/supply_chain_db
      REDIS_URL: redis://redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-6}
      CORS_ORIGINS: http://localhost:3000
      GOLD_PATH: /app/data/gold
      DATA_DIR: /app/data/source
      LOG_LEVEL: info
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ── Dashboard ─────────────────────────────────────────────────────────────
  nextjs:
    build:
      context: .
      dockerfile: docker/Nextjs.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_WS_URL: ws://localhost:8000
    container_name: sc-dashboard
    restart: unless-stopped
    depends_on:
      fastapi:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000

  # ── Observability ─────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: sc-grafana
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_DEFAULT_THEME: dark
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/supply_chain.json
    volumes:
      - grafana_minimal_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped

volumes:
  postgres_minimal_data:
  redis_minimal_data:
  grafana_minimal_data:
