global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: supply-chain-os

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: fastapi
    static_configs:
      - targets: ["fastapi:8000"]
    metrics_path: /metrics

  - job_name: alloy
    static_configs:
      - targets: ["alloy:12345"]
    metrics_path: /metrics
