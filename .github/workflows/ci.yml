name: CI / CD

on:
  push:
    branches: [main, ujjwal]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ─────────────────────────────────────────────────────────────────
  # JOB 1: Unit Tests + Coverage
  # ─────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run tests with coverage
        env:
          DATABASE_URL: "postgresql://supplychain:ci_password@localhost:5432/supply_chain_db"
          ANTHROPIC_API_KEY: "ci-placeholder"
          GOLD_PATH: "data/gold"
          SILVER_PATH: "data/silver"
          BRONZE_PATH: "data/bronze"
          # API_KEYS intentionally NOT set here — conftest.py forces it to ""
          # so auth middleware is disabled and test clients need no auth header.
        run: |
          python -m pytest tests/ -q \
            --tb=short \
            --cov=api \
            --cov=ingestion \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=45

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────────
  # JOB 2: Hardcoded Secret Detection
  # ─────────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for hardcoded credentials
        run: |
          FOUND=0
          # Look for raw string assignments of password/secret/key values
          # Excludes: env var reads, placeholders, test fixtures, comments
          while IFS= read -r line; do
            echo "POTENTIAL SECRET: $line"
            FOUND=1
          done < <(grep -rn \
            --include="*.py" \
            --exclude-dir=".git" \
            --exclude="conftest.py" \
            -E "(password|secret|api_key)\s*=\s*['\"][^'\"$\{\(]{10,}['\"]" \
            api/ ingestion/ reasoning/ integrations/ 2>/dev/null || true)
          if [ "$FOUND" -eq 1 ]; then
            echo "Hardcoded secrets found — failing build."
            exit 1
          fi
          echo "No hardcoded secrets detected."

  # ─────────────────────────────────────────────────────────────────
  # JOB 3: dbt Model Syntax Validation
  # ─────────────────────────────────────────────────────────────────
  dbt-validate:
    name: dbt Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Validate dbt models have content
        run: |
          python -c "
          from pathlib import Path
          models = list(Path('transforms/models').rglob('*.sql'))
          print(f'Found {len(models)} dbt models')
          for m in models:
              content = m.read_text()
              assert len(content) > 10, f'{m} appears empty'
          print('All dbt models OK')
          "

  # ─────────────────────────────────────────────────────────────────
  # JOB 4: Docker Compose Config Validation
  # ─────────────────────────────────────────────────────────────────
  docker-validate:
    name: Docker Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Copy env file
        run: cp .env.example .env && echo "POSTGRES_PASSWORD=test" >> .env && echo "API_KEYS=test-key" >> .env && echo "ANTHROPIC_API_KEY=test-key" >> .env

      - name: Validate docker-compose
        run: docker compose config --quiet

  agents-validate:
    name: Agents Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install agent dependencies
        run: pip install -r requirements-agents.txt

      - name: Validate agent imports
        run: |
          python -c "from agents.base import BaseAgent; print('base OK')"
          python -c "from agents.kafka_guardian import KafkaGuardianAgent; print('kafka OK')"
          python -c "from agents.dagster_guardian import DagsterGuardianAgent; print('dagster OK')"
          python -c "from agents.medallion.bronze import BronzeAgent; print('bronze OK')"
          python -c "from agents.medallion.silver import SilverAgent; print('silver OK')"
          python -c "from agents.medallion.gold import GoldAgent; print('gold OK')"
          python -c "from agents.orchestrator import OrchestratorAgent; print('orchestrator OK')"
          python -c "from agents.run_all import AGENT_CLASSES; print(f'All {len(AGENT_CLASSES)} agents registered')"

  # ─────────────────────────────────────────────────────────────────
  # JOB 5: Auto-tag on merge to main
  # ─────────────────────────────────────────────────────────────────
  tag-release:
    name: Tag Release
    runs-on: ubuntu-latest
    needs: [test, secret-scan, dbt-validate, docker-validate, agents-validate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto-tag version
        run: |
          VERSION=$(date +v%Y.%m.%d)-$(git rev-parse --short HEAD)
          git tag "$VERSION"
          git push origin "$VERSION"
          echo "Tagged: $VERSION"

  # ─────────────────────────────────────────────────────────────────
  # JOB 6: Deploy placeholder (add VM_HOST, VM_USER, VM_SSH_KEY
  # secrets when Oracle VM is provisioned to enable auto-deploy)
  # ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy (skipped — no VM configured)
    runs-on: ubuntu-latest
    needs: [test, secret-scan, dbt-validate, docker-validate, agents-validate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.DEPLOY_ENABLED == 'true'

    steps:
      - run: echo "Deploy skipped — set DEPLOY_ENABLED=true in repo vars when VM is ready"
