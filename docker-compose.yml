# Supply Chain AI Operating System - Production Infrastructure
# Inspired by Auger's architecture: collapse the gap between signal and execution

services:
  # --- MESSAGE BROKER ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: supply-chain-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: supply-chain-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 5

  # Ensures required topics (incl. DLQ) exist before producers/consumers start
  kafka-init:
    image: confluentinc/cp-kafka:7.4.0
    container_name: supply-chain-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - "kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic supply-chain-events --partitions 3 --replication-factor 1 && kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic supply-chain-dlq --partitions 1 --replication-factor 1 --config retention.ms=604800000 && echo 'Kafka topics ready.'"
    restart: on-failure

  # --- DATABASES & STORAGE ---
  postgres:
    image: postgres:15-alpine
    container_name: supply-chain-postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-supplychain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supplychain_secret}
      POSTGRES_DB: ${POSTGRES_DB:-supply_chain_db}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init-dagster.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-supplychain} -d ${POSTGRES_DB:-supply_chain_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: supply-chain-minio
    command: server /data --console-address ":9001"
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/9000' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/minio:latest
    container_name: supply-chain-minio-init
    depends_on:
      minio:
        condition: service_healthy
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        mc mb --ignore-existing local/supply-chain-lakehouse &&
        mc anonymous set download local/supply-chain-lakehouse &&
        echo 'MinIO bucket ready: supply-chain-lakehouse'
      "
    restart: on-failure

  redis:
    image: redis:7-alpine
    container_name: supply-chain-redis
    env_file: .env
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- ORCHESTRATION ---
  dagster-webserver:
    build:
      context: .
      dockerfile: docker/Dagster.Dockerfile
    env_file: .env
    container_name: supply-chain-dagster-webserver
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "3001:3000"
    environment:
      DAGSTER_POSTGRES_HOST: postgres
      DAGSTER_POSTGRES_PORT: 5432
      DAGSTER_POSTGRES_USER: ${POSTGRES_USER:-supplychain}
      DAGSTER_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supplychain_secret}
      DAGSTER_POSTGRES_DB: dagster
      DAGSTER_WEBSERVER_HOST: 0.0.0.0
      DAGSTER_CURRENT_IMAGE: supply-chain-dagster
      S3_STORAGE_BUCKET: supply-chain-lakehouse
      MINIO_ENDPOINT_URL: http://minio:9000
      DATA_DIR: /opt/dagster/app/data/source
      BRONZE_PATH: /opt/dagster/app/data/bronze
      SILVER_PATH: /opt/dagster/app/data/silver
      GOLD_PATH: /opt/dagster/app/data/gold
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - ./pipeline:/opt/dagster/app/pipeline
      - ./ingestion:/opt/dagster/app/ingestion
      - ./transforms:/opt/dagster/app/transforms
      - ./quality:/opt/dagster/app/quality
      - ./data:/opt/dagster/app/data

  dagster-daemon:
    build:
      context: .
      dockerfile: docker/Dagster.Dockerfile
    env_file: .env
    container_name: supply-chain-dagster-daemon
    command: ["dagster-daemon", "run"]
    depends_on:
      postgres:
        condition: service_healthy
      dagster-webserver:
        condition: service_started
    environment:
      DAGSTER_POSTGRES_HOST: postgres
      DAGSTER_POSTGRES_PORT: 5432
      DAGSTER_POSTGRES_USER: ${POSTGRES_USER:-supplychain}
      DAGSTER_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supplychain_secret}
      DAGSTER_POSTGRES_DB: dagster
      DAGSTER_CURRENT_IMAGE: supply-chain-dagster
      S3_STORAGE_BUCKET: supply-chain-lakehouse
      MINIO_ENDPOINT_URL: http://minio:9000
      DATA_DIR: /opt/dagster/app/data/source
      BRONZE_PATH: /opt/dagster/app/data/bronze
      SILVER_PATH: /opt/dagster/app/data/silver
      GOLD_PATH: /opt/dagster/app/data/gold
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - ./pipeline:/opt/dagster/app/pipeline
      - ./ingestion:/opt/dagster/app/ingestion
      - ./transforms:/opt/dagster/app/transforms
      - ./quality:/opt/dagster/app/quality
      - ./data:/opt/dagster/app/data

  # --- API & SERVICES ---
  fastapi:
    build:
      context: .
      dockerfile: docker/FastAPI.Dockerfile
    env_file: .env
    container_name: supply-chain-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-supplychain}:${POSTGRES_PASSWORD:-supplychain_secret}@postgres:5432/${POSTGRES_DB:-supply_chain_db}
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      AUTONOMY_CONFIDENCE_THRESHOLD: ${AUTONOMY_CONFIDENCE_THRESHOLD:-0.70}
      DATA_DIR: /app/data/source
      DATA_ROOT: /app/data
      BRONZE_PATH: /app/data/bronze
      SILVER_PATH: /app/data/silver
      GOLD_PATH: /app/data/gold
      MINIO_ENDPOINT_URL: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_STORAGE_BUCKET: supply-chain-lakehouse
      KSQLDB_URL: http://ksqldb-server:8088
      MLFLOW_TRACKING_URI: http://mlflow:5000
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: supply-chain-api
      OTEL_ENABLED: "true"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ./api:/app/api
      - ./streaming:/app/streaming
      - ./reasoning:/app/reasoning
      - ./integrations:/app/integrations
      - ./scripts:/app/scripts
      - ./data:/app/data

  # --- FRONTEND ---
  nextjs:
    build:
      context: .
      dockerfile: docker/Nextjs.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
    env_file: .env
    container_name: supply-chain-dashboard
    depends_on:
      - fastapi
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
    # No volume mount: use built image so .next is preserved (mount overwrote it and broke npm start)

  # --- DATA INGESTION ---
  producer:
    build:
      context: .
      dockerfile: docker/Producer.Dockerfile
    container_name: supply-chain-producer
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: supply-chain-events
    command: ["python", "ingestion/producer.py"]

  pg-writer:
    build:
      context: .
      dockerfile: docker/Producer.Dockerfile
    container_name: supply-chain-pg-writer
    env_file: .env
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: supply-chain-events
      DATABASE_URL: postgresql://${POSTGRES_USER:-supplychain}:${POSTGRES_PASSWORD:-supplychain_secret}@postgres:5432/${POSTGRES_DB:-supply_chain_db}
      REDIS_URL: redis://redis:6379/0
      PG_WRITER_BATCH_SIZE: "10"
    command: ["python", "ingestion/pg_writer.py"]

  # --- STREAMING ANALYTICS ---
  schema-registry:
    image: confluentinc/cp-schema-registry:7.4.0
    container_name: supply-chain-schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/subjects || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  ksqldb-server:
    image: confluentinc/cp-ksqldb-server:7.4.0
    container_name: supply-chain-ksqldb
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    ports:
      - "8088:8088"
    environment:
      KSQL_BOOTSTRAP_SERVERS: kafka:9092
      KSQL_KSQL_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      KSQL_KSQL_LOGGING_PROCESSING_STREAM_AUTO_CREATE: "true"
      KSQL_KSQL_LOGGING_PROCESSING_TOPIC_AUTO_CREATE: "true"
      KSQL_LISTENERS: http://0.0.0.0:8088
      KSQL_KSQL_SERVICE_ID: supply_chain_ksql
      KSQL_KSQL_STREAMS_AUTO_OFFSET_RESET: earliest
      KSQL_HEAP_OPTS: "-Xmx512m -Xms128m"
    mem_limit: 768m
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8088/info || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  ksqldb-init:
    image: curlimages/curl:8.5.0
    container_name: supply-chain-ksqldb-init
    depends_on:
      ksqldb-server:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo 'Creating ksqlDB streams...'
        curl -s -X POST http://ksqldb-server:8088/ksql \
          -H 'Content-Type: application/vnd.ksql.v1+json' \
          -d '{"ksql":"CREATE STREAM IF NOT EXISTS supply_chain_events (event_type VARCHAR, order_id VARCHAR, supplier_id VARCHAR, product VARCHAR, region VARCHAR, quantity INT, unit_price DOUBLE, order_value DOUBLE, delay_days INT, status VARCHAR, inventory_level DOUBLE) WITH (KAFKA_TOPIC='"'"'supply-chain-events'"'"', VALUE_FORMAT='"'"'JSON'"'"');","streamsProperties":{}}' || true
        curl -s -X POST http://ksqldb-server:8088/ksql \
          -H 'Content-Type: application/vnd.ksql.v1+json' \
          -d '{"ksql":"CREATE STREAM IF NOT EXISTS order_events AS SELECT * FROM supply_chain_events WHERE event_type = '"'"'ORDER'"'"' EMIT CHANGES;","streamsProperties":{}}' || true
        curl -s -X POST http://ksqldb-server:8088/ksql \
          -H 'Content-Type: application/vnd.ksql.v1+json' \
          -d '{"ksql":"CREATE TABLE IF NOT EXISTS supplier_delay_rate_5m AS SELECT supplier_id, COUNT(*) AS total_orders, SUM(CASE WHEN delay_days > 0 THEN 1 ELSE 0 END) AS delayed_orders, CAST(SUM(CASE WHEN delay_days > 0 THEN 1 ELSE 0 END) AS DOUBLE) / COUNT(*) AS delay_rate, AVG(delay_days) AS avg_delay_days, WINDOWSTART AS window_start, WINDOWEND AS window_end FROM order_events WINDOW TUMBLING (SIZE 5 MINUTES, RETENTION 24 HOURS) GROUP BY supplier_id EMIT CHANGES;","streamsProperties":{}}' || true
        echo 'ksqlDB streams ready.'
    restart: on-failure

  # --- ML EXPERIMENT TRACKING ---
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.3
    container_name: supply-chain-mlflow
    ports:
      - "5001:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://${POSTGRES_USER:-supplychain}:${POSTGRES_PASSWORD:-supplychain_secret}@postgres:5432/mlflow_db
      MLFLOW_DEFAULT_ARTIFACT_ROOT: s3://supply-chain-lakehouse/mlflow
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    entrypoint:
      - /bin/sh
      - -c
      - "pip install psycopg2-binary boto3 --quiet && mlflow server --backend-store-uri postgresql://${POSTGRES_USER:-supplychain}:${POSTGRES_PASSWORD:-supplychain_secret}@postgres:5432/mlflow_db --default-artifact-root s3://supply-chain-lakehouse/mlflow --host 0.0.0.0 --port 5000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 20s
      timeout: 10s
      retries: 10

  # --- DISTRIBUTED TRACING ---
  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: supply-chain-jaeger
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
      - "14268:14268"   # Jaeger HTTP collector
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:16686 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # --- OBSERVABILITY ---
  grafana:
    image: grafana/grafana:10.4.0
    container_name: supply-chain-grafana
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_DEFAULT_THEME: dark
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/supply_chain.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  minio_data:
  redis_data:
  grafana_data:
  mlflow_data:
